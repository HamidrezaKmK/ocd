name: Deploy web UI to GitHub Pages

# Publishes the static single-page frontend (src/ocd/web) to GitHub Pages.
# The backend (FastAPI + Ollama) is NOT hosted here — it runs on your machine and
# is reached via a tunnel; the page's PAGES_BACKEND constant points at it.
# One-time: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "src/ocd/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/ocd/web
      - id: deployment
        uses: actions/deploy-pages@v4
